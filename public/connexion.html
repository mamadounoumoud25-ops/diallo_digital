<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion & Inscription - Diallo Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; padding: 2rem 1rem; position: relative; overflow: hidden; }
        body::before {
            content: ''; position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
            top: -150px; left: -100px; border-radius: 50%; pointer-events: none;
        }
        body::after {
            content: ''; position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 70%);
            bottom: -100px; right: -100px; border-radius: 50%; pointer-events: none;
        }
        .auth-card {
            width: 100%; max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            position: relative; z-index: 2;
            animation: fadeInUp 0.6s ease-out;
        }
        .auth-logo {
            text-align: center; margin-bottom: 2rem;
        }
        .auth-logo-text {
            font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.8rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-logo-sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem; }
        .auth-tabs {
            display: flex; gap: 4px; margin-bottom: 2rem;
            background: var(--bg-elevated); border-radius: 999px; padding: 4px;
        }
        .auth-tab {
            flex: 1; text-align: center; padding: 0.65rem;
            border-radius: 999px; cursor: pointer; font-weight: 600; font-size: 0.88rem;
            color: var(--text-secondary); transition: var(--t-fast);
        }
        .auth-tab.active {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white; box-shadow: 0 4px 15px rgba(108,99,255,0.35);
        }
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeInUp 0.3s ease-out; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block; margin-bottom: 0.45rem;
            font-size: 0.8rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .form-group input {
            width: 100%; padding: 0.9rem 1rem;
            background: var(--bg-elevated); border: 1.5px solid var(--border);
            border-radius: var(--radius-md); color: var(--text-primary);
            font-family: 'Inter', sans-serif; font-size: 0.95rem;
            transition: border-color var(--t-fast);
        }
        .form-group input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
        }
        .form-group input::placeholder { color: var(--text-muted); }
        .btn-auth {
            width: 100%; padding: 1rem;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white; border: none; border-radius: var(--radius-md);
            font-weight: 700; font-size: 1rem; cursor: pointer;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 25px rgba(108,99,255,0.35);
            transition: var(--t-fast); margin-top: 0.5rem;
        }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 14px 35px rgba(108,99,255,0.5); }
        .auth-divider {
            text-align: center; margin: 1.5rem 0;
            color: var(--text-muted); font-size: 0.82rem;
            position: relative;
        }
        .auth-divider::before, .auth-divider::after {
            content: ''; position: absolute; top: 50%; width: 40%;
            height: 1px; background: var(--border);
        }
        .auth-divider::before { left: 0; }
        .auth-divider::after { right: 0; }
        .back-link {
            display: block; text-align: center; margin-top: 1.5rem;
            color: var(--text-muted); font-size: 0.85rem; transition: color var(--t-fast);
        }
        .back-link:hover { color: var(--accent); }
        .msg-box { margin-top: 1rem; padding: 0.8rem; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600; text-align: center; display: none; }
        .msg-success { background: rgba(48,209,88,0.1); border: 1px solid rgba(48,209,88,0.3); color: #30d158; }
        .msg-error { background: rgba(255,69,58,0.1); border: 1px solid rgba(255,69,58,0.3); color: var(--danger); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-text">DIALLO DIGITAL.</div>
            <div class="auth-logo-sub">Votre Espace Personnel</div>
        </div>

        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Se Connecter</div>
            <div class="auth-tab" id="tab-register" onclick="switchTab('register')">S'inscrire</div>
        </div>

        <!-- Connexion -->
        <form id="form-login" class="auth-form active">
            <div class="form-group">
                <label>Numéro de téléphone</label>
                <input type="tel" id="login-phone" placeholder="Ex: 611 760 045" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="login-pwd" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth">🔐 Se connecter</button>
            <div class="msg-box" id="login-msg"></div>
        </form>

        <!-- Inscription -->
        <form id="form-register" class="auth-form">
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" id="reg-name" placeholder="Ex: Amadou Diallo" required>
            </div>
            <div class="form-group">
                <label>Numéro de téléphone</label>
                <input type="tel" id="reg-phone" placeholder="Ex: 611 760 045" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="reg-pwd" placeholder="Créez un mot de passe" required>
            </div>
            <button type="submit" class="btn-auth">✨ Créer mon compte</button>
            <div class="msg-box" id="reg-msg"></div>
        </form>

        <div class="auth-divider">ou</div>
        <a href="index.html" class="back-link">← Retour à la boutique</a>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('form-' + tab).classList.add('active');
        }
        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'msg-box ' + (type === 'success' ? 'msg-success' : 'msg-error');
            el.style.display = 'block';
        }
        document.getElementById('form-register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = '⏳ Création...'; btn.disabled = true;
            try {
                const res = await fetch('/api/auth/customer-register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fullName: document.getElementById('reg-name').value, phone: document.getElementById('reg-phone').value, password: document.getElementById('reg-pwd').value }) });
                const data = await res.json();
                if (data.token) { localStorage.setItem('customer_token', data.token); localStorage.setItem('customer_info', JSON.stringify(data.user)); window.location.href = 'mon-compte.html'; }
                else showMsg('reg-msg', data.error || "Erreur d'inscription", 'error');
            } catch { showMsg('reg-msg', 'Erreur serveur.', 'error'); }
            finally { btn.textContent = '✨ Créer mon compte'; btn.disabled = false; }
        });
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = '⏳ Connexion...'; btn.disabled = true;
            try {
                const res = await fetch('/api/auth/customer-login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone: document.getElementById('login-phone').value, password: document.getElementById('login-pwd').value }) });
                const data = await res.json();
                if (data.token) { localStorage.setItem('customer_token', data.token); localStorage.setItem('customer_info', JSON.stringify(data.user)); window.location.href = 'mon-compte.html'; }
                else showMsg('login-msg', data.error || 'Erreur de connexion', 'error');
            } catch { showMsg('login-msg', 'Erreur serveur.', 'error'); }
            finally { btn.textContent = '🔐 Se connecter'; btn.disabled = false; }
        });
        if (localStorage.getItem('customer_token')) window.location.href = 'mon-compte.html';
    </script>
</body>
</html>
