<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Vendeur - Diallo Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .login-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: white;
        }
        .login-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: white;
            font-size: 1rem;
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-login:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 1rem;
            min-height: 1.2rem;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <h1>Espace Vendeur</h1>
                <p>Gérez votre boutique et vos ventes</p>
            </div>
            <form id="seller-login-form">
                <div class="form-group">
                    <label>Numéro de téléphone</label>
                    <input type="tel" id="login-phone" placeholder="6XX XX XX XX" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="login-pwd" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Se connecter</button>
                <div id="error-msg" class="error-msg"></div>
            </form>
            <div style="text-align: center; margin-top: 2rem;">
                <a href="devenir-vendeur.html" style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">Pas encore partenaire ? Postulez ici</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('seller-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('login-phone').value;
            const password = document.getElementById('login-pwd').value;
            const errorEl = document.getElementById('error-msg');
            
            errorEl.textContent = '';
            
            try {
                const res = await fetch('/api/auth/seller-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('sellerToken', data.token);
                    localStorage.setItem('sellerInfo', JSON.stringify(data.seller));
                    window.location.href = 'vendeur-dashboard.html';
                } else {
                    errorEl.textContent = data.error || 'Erreur de connexion.';
                }
            } catch (err) {
                errorEl.textContent = 'Erreur serveur. Veuillez réessayer.';
            }
        });
    </script>
</body>
</html>
