<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - Diallo Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; position: relative; overflow: hidden; }
        body::before {
            content: ''; position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
            top: -100px; right: -100px; border-radius: 50%; pointer-events: none;
        }
        .login-card {
            width: 100%; max-width: 400px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-xl); padding: 2.5rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            position: relative; z-index: 2;
            animation: fadeInUp 0.5s ease-out;
        }
        .login-header { text-align: center; margin-bottom: 2.5rem; }
        .login-logo {
            font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.6rem;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .login-badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3);
            padding: 0.35rem 1rem; border-radius: 999px; font-size: 0.75rem;
            font-weight: 700; color: var(--accent); text-transform: uppercase;
            letter-spacing: 0.06em; margin-top: 0.8rem;
        }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block; margin-bottom: 0.45rem; font-size: 0.78rem;
            font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .form-group input {
            width: 100%; padding: 0.9rem 1rem;
            background: var(--bg-elevated); border: 1.5px solid var(--border);
            border-radius: var(--radius-md); color: var(--text-primary);
            font-family: 'Inter', sans-serif; font-size: 0.95rem;
            transition: border-color var(--t-fast);
        }
        .form-group input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
        }
        .form-group input::placeholder { color: var(--text-muted); }
        .btn-login {
            width: 100%; padding: 1rem;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white; border: none; border-radius: var(--radius-md);
            font-weight: 700; font-size: 1rem; cursor: pointer;
            font-family: 'Inter', sans-serif; margin-top: 0.5rem;
            box-shadow: 0 8px 25px rgba(108,99,255,0.35);
            transition: var(--t-fast);
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 14px 35px rgba(108,99,255,0.5); }
        .error-msg {
            display: none; margin-top: 1rem; padding: 0.75rem;
            background: rgba(255,69,58,0.1); border: 1px solid rgba(255,69,58,0.3);
            border-radius: var(--radius-sm); color: var(--danger);
            font-size: 0.85rem; font-weight: 600; text-align: center;
        }
        .back-link {
            display: block; text-align: center; margin-top: 1.8rem;
            color: var(--text-muted); font-size: 0.85rem; transition: color var(--t-fast);
        }
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">DIALLO DIGITAL.</div>
            <div class="login-badge">⚙️ Espace Administration</div>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="admin" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="btn-submit">🔐 Accéder au Dashboard</button>
        </form>

        <div class="error-msg" id="error-msg"></div>
        <a href="index.html" class="back-link">← Retour à la boutique</a>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.textContent = '⏳ Vérification...'; btn.disabled = true;
            const errEl = document.getElementById('error-msg');
            errEl.style.display = 'none';
            try {
                const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value }) });
                const data = await res.json();
                if (data.token) { localStorage.setItem('adminToken', data.token); window.location.href = 'admin.html'; }
                else { errEl.textContent = data.error || 'Identifiants incorrects.'; errEl.style.display = 'block'; }
            } catch { errEl.textContent = 'Erreur de connexion au serveur.'; errEl.style.display = 'block'; }
            finally { btn.textContent = '🔐 Accéder au Dashboard'; btn.disabled = false; }
        });
    </script>
</body>
</html>
