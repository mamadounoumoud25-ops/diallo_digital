<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diallo Digital - Connexion Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-main);
        }
        .login-box {
            background: var(--bg-surface);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h2 {
            color: var(--primary);
            margin-bottom: 2rem;
            font-family: var(--font-heading);
            font-weight: 900;
        }
        .login-box h2 span { color: var(--accent); }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>DIALLO DIGITAL<span>.</span><br><small style="font-size:1rem; color:var(--text-muted)">Administration</small></h2>
        
        <form id="login-form">
            <div class="input-group" style="text-align: left;">
                <label>Nom d'utilisateur</label>
                <input type="text" id="username" required>
            </div>
            <div class="input-group" style="text-align: left; margin-bottom: 2rem;">
                <label>Mot de passe</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="submit-checkout-btn" style="width:100%">Se connecter</button>
        </form>
        <p id="error-msg" style="color:red; margin-top:1rem; display:none;"></p>
        <div style="margin-top:2rem">
            <a href="index.html" style="color:var(--text-muted); font-size:0.9rem">Retour à la boutique</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                
                const data = await res.json();
                
                if (data.token) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'admin.html';
                } else {
                    document.getElementById('error-msg').textContent = data.error || 'Erreur de connexion';
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('error-msg').textContent = 'Erreur serveur';
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
